<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FireRAG</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        overflow: hidden;
        background: #0d1117;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      }

      /* ── Mapbox popup ── */
      .mapboxgl-popup-content {
        background: #ffffff !important;
        border: 1px solid #d0d7de !important;
        border-radius: 6px !important;
        padding: 0 !important;
        box-shadow: 0 8px 24px rgba(31,35,40,0.12) !important;
      }
      .mapboxgl-popup-tip { display: none !important; }
      .mapboxgl-popup-close-button {
        color: #6e7781 !important;
        font-size: 16px !important;
        padding: 6px 8px !important;
        line-height: 1 !important;
        right: 0 !important; top: 0 !important;
      }
      .mapboxgl-popup-close-button:hover {
        color: #1f2328 !important;
        background: none !important;
      }

      .popup-inner {
        padding: 12px 14px 11px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
        min-width: 180px;
      }
      .popup-title {
        font-size: 12px;
        font-weight: 600;
        color: #1f2328;
        margin-bottom: 8px;
        padding-right: 16px;
      }
      .popup-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        color: #636c76;
        margin-bottom: 3px;
        gap: 12px;
      }
      .popup-row span:last-child {
        color: #1f2328;
        font-weight: 500;
        text-align: right;
      }
      .popup-risk span:last-child { color: #bc4c00; }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #d0d7de; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #afb8c1; }

      /* ── Mapbox nav control ── */
      .mapboxgl-ctrl-group {
        background: #ffffff !important;
        border: 1px solid #d0d7de !important;
        box-shadow: 0 1px 4px rgba(31,35,40,0.08) !important;
        border-radius: 6px !important;
        margin-bottom: 56px !important;
        margin-right: 12px !important;
      }
      .mapboxgl-ctrl-group button {
        background: transparent !important;
        color: #636c76 !important;
        width: 28px !important;
        height: 28px !important;
      }
      .mapboxgl-ctrl-group button:hover {
        background: #f6f8fa !important;
      }
      .mapboxgl-ctrl-icon { filter: invert(0.3) !important; }

      /* ── Mapbox logo / attribution ── */
      .mapboxgl-ctrl-logo { opacity: 0.5 !important; }
      .mapboxgl-ctrl-attrib { font-size: 9px !important; opacity: 0.6 !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
